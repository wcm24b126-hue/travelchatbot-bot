<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Scout | AI Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f9ff; }
        .markdown-body p { margin-bottom: 0.8rem; }
        .markdown-body strong { color: #0d9488; font-weight: 700; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-2 sm:p-6">

    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col h-full max-h-[850px] border border-teal-100">
        
        <div class="bg-teal-600 p-6 flex items-center shadow-lg">
            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-2xl mr-4 shadow-md">🌍</div>
            <div>
                <h1 class="text-white font-bold text-xl tracking-tight">Travel Scout AI</h1>
                <div class="flex items-center text-teal-100 text-xs">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full mr-2 animate-pulse"></span> Ready for Takeoff
                </div>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-4 sm:p-8 overflow-y-auto bg-slate-50/50 space-y-6 scrollbar-hide">
            <div class="flex items-start">
                <div class="bg-white p-5 rounded-2xl rounded-tl-none shadow-sm text-slate-700 max-w-[90%] border border-teal-50 markdown-body">
                    Hi! I'm your **Travel Scout**. Where are we heading next? ✈️
                </div>
            </div>
        </div>

        <div class="p-4 sm:p-6 bg-white border-t border-slate-100">
            <form id="chat-form" class="flex items-center space-x-3 bg-slate-100 p-2 rounded-2xl border border-slate-200 focus-within:ring-2 focus-within:ring-teal-500 transition-all">
                <input type="text" id="chat-input" required
                    class="flex-1 bg-transparent px-4 py-3 focus:outline-none text-slate-700 placeholder-slate-400" 
                    placeholder="Ask about Tokyo, Paris, or budget hiking...">
                <button type="submit" id="send-btn"
                    class="bg-teal-600 text-white rounded-xl h-12 w-12 flex items-center justify-center hover:bg-teal-700 transition-all active:scale-90 disabled:opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 rotate-45" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const WORKER_URL = 'https://morning-violet-528a.wcm24b126.workers.dev';
        const sessionId = 'session-' + Math.random().toString(36).substring(2, 15);

        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            chatInput.value = '';
            const loadingId = appendLoading();
            sendBtn.disabled = true;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: text, sessionId: sessionId })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                // n8n Agent returns "output"
                const botReply = data.output || data.text || "I'm having trouble connecting to the satellite. Try again!";
                appendMessage(botReply, 'bot');

            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage("**Error:** Navigation failed. Is the n8n workflow Active?", 'bot');
            } finally {
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'flex items-end justify-end' : 'flex items-start';
            const innerDiv = document.createElement('div');
            if (sender === 'user') {
                innerDiv.className = 'bg-teal-600 text-white p-4 rounded-2xl rounded-tr-none shadow-md max-w-[85%]';
                innerDiv.textContent = text;
            } else {
                innerDiv.className = 'bg-white p-5 rounded-2xl rounded-tl-none shadow-sm text-slate-700 max-w-[90%] border border-teal-50 markdown-body';
                innerDiv.innerHTML = marked.parse(text);
            }
            div.appendChild(innerDiv);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.innerHTML = `<div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 flex space-x-1 items-center w-16 h-10">
                <div class="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style="animation-delay:0.2s"></div>
                <div class="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style="animation-delay:0.4s"></div>
            </div>`;
            chatBox.appendChild(div);
            return id;
        }
    </script>
</body>
</html>
